<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <rect width="40" height="40" rx="10" fill="#6366f1"/>
  <!-- Calendar grid base -->
  <rect x="8" y="13" width="24" height="20" rx="3" fill="white" fill-opacity="0.15"/>
  <!-- Top bar -->
  <rect x="8" y="13" width="24" height="6" rx="3" fill="white" fill-opacity="0.3"/>
  <rect x="11" y="13" width="24" height="4" fill="white" fill-opacity="0.3"/>
  <!-- Calendar hooks -->
  <rect x="14" y="9" width="3" height="7" rx="1.5" fill="white" fill-opacity="0.9"/>
  <rect x="23" y="9" width="3" height="7" rx="1.5" fill="white" fill-opacity="0.9"/>
  <!-- Dot grid -->
  <circle cx="15" cy="25" r="1.5" fill="white" fill-opacity="0.9"/>
  <circle cx="20" cy="25" r="1.5" fill="white" fill-opacity="0.9"/>
  <circle cx="25" cy="25" r="1.5" fill="white" fill-opacity="0.9"/>
  <circle cx="15" cy="30" r="1.5" fill="white" fill-opacity="0.9"/>
  <circle cx="20" cy="30" r="1.5" fill="white" fill-opacity="0.9"/>
  <!-- Checkmark dot (done) -->
  <circle cx="25" cy="30" r="1.5" fill="#a5b4fc"/>
</svg>
